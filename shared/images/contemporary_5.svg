<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Multi-stop Sapphire Gradient -->
    <linearGradient id="contemporaryGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DBEAFE" /> <!-- Lightest Blue -->
      <stop offset="30%" stop-color="#3B82F6" /> <!-- Base Blue -->
      <stop offset="70%" stop-color="#1E40AF" /> <!-- Deep Blue -->
      <stop offset="100%" stop-color="#1E3A8A" /> <!-- Midnight Blue -->
    </linearGradient>
    
    <!-- Indigo Edge Highlight -->
    <linearGradient id="contemporaryEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="100%" stop-color="#1E3A8A" />
    </linearGradient>
  </defs>

  <!-- Faceted Gem Shape (Octagon) -->
  <path 
    d="M8 2H16L22 8V16L16 22H8L2 16V8L8 2Z" 
    fill="url(#contemporaryGradient5)" 
    stroke="url(#contemporaryEdge)" 
    stroke-width="0.5"
  />

  <!-- Internal Facet Lines (Clean Geometry) -->
  <path d="M8 2L12 12M16 2L12 12M22 8L12 12M22 16L12 12M16 22L12 12M8 22L12 12M2 16L12 12M2 8L12 12" stroke="white" stroke-width="0.2" opacity="0.3"/>

  <!-- The Frame Glyph (Boldest Form) -->
  <g transform="translate(2, 2) scale(0.83)">
    <path 
      d="M14 6H6V18H18V10" 
      stroke="#FFFFFF" 
      stroke-width="2.5" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
  </g>

  <!-- Animated "Modern" Sparkles (Calm, soft pulses) -->
  <circle cx="6" cy="6" r="0.5" fill="#BFDBFE" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="18" cy="18" r="0.5" fill="#BFDBFE" opacity="0.8">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite" />
  </circle>
</svg>

