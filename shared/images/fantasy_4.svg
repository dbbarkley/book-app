<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Magical Gradient for Tier 4 -->
    <linearGradient id="fantasyGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD" /> <!-- Light purple -->
      <stop offset="100%" stop-color="#A78BFA" /> <!-- Base purple -->
    </linearGradient>
  </defs>

  <!-- Radiant Halo (Outer Ring) -->
  <circle cx="12" cy="12" r="11.5" stroke="#A78BFA" stroke-width="0.5" stroke-dasharray="2 1" opacity="0.8"/>
  
  <!-- Solid Gradient Background -->
  <circle cx="12" cy="12" r="10" fill="url(#fantasyGradient4)"/>
  
  <!-- White Spark Glyph -->
  <g transform="translate(1.8, 1.8) scale(0.85)">
    <path 
      d="M12 4L14.5 9.5L20 12L14.5 14.5L12 20L9.5 14.5L4 12L9.5 9.5L12 4Z" 
      stroke="#FFFFFF" 
      stroke-width="1.8" 
      stroke-linejoin="round"
    />
    <circle cx="12" cy="12" r="1.5" stroke="#FFFFFF" stroke-width="1"/>
  </g>
