<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Multi-stop Mystical Gradient -->
    <linearGradient id="fantasyGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DDD6FE" /> <!-- Lightest Purple -->
      <stop offset="30%" stop-color="#A78BFA" /> <!-- Base Purple -->
      <stop offset="70%" stop-color="#7C3AED" /> <!-- Deep Magic Purple -->
      <stop offset="100%" stop-color="#5B21B6" /> <!-- Dark Arcane Purple -->
    </linearGradient>
    
    <!-- Gold Highlight for the Gem Edges -->
    <linearGradient id="goldEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
  </defs>

  <!-- Faceted Gem Shape (Octagon) -->
  <path 
    d="M8 2H16L22 8V16L16 22H8L2 16V8L8 2Z" 
    fill="url(#fantasyGradient5)" 
    stroke="url(#goldEdge)" 
    stroke-width="0.5"
  />

  <!-- Internal Facet Lines -->
  <path d="M8 2L12 12M16 2L12 12M22 8L12 12M22 16L12 12M16 22L12 12M8 22L12 12M2 16L12 12M2 8L12 12" stroke="white" stroke-width="0.2" opacity="0.3"/>

  <!-- The Spark Glyph -->
  <g transform="translate(2, 2) scale(0.83)">
    <path 
      d="M12 4L14.5 9.5L20 12L14.5 14.5L12 20L9.5 14.5L4 12L9.5 9.5L12 4Z" 
      stroke="#FFFFFF" 
      stroke-width="2" 
      stroke-linejoin="round"
    />
    <circle cx="12" cy="12" r="1.5" stroke="#FFFFFF" stroke-width="1.2"/>
  </g>

  <!-- Animated Arcane Sparkles -->
  <circle cx="6" cy="6" r="0.6" fill="#FDE68A" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.5s" repeatCount="indefinite" />
    <animate attributeName="r" values="0.6;0.9;0.6" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="18" cy="18" r="0.6" fill="#FDE68A" opacity="0.8">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite" />
    <animate attributeName="r" values="0.9;0.6;0.9" dur="2.5s" repeatCount="indefinite" />
  </circle>
</svg>