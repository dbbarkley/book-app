<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Multi-stop Obsidian Gradient -->
    <linearGradient id="mysteryGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F1F5F9" /> <!-- Highlight -->
      <stop offset="30%" stop-color="#94A3B8" /> <!-- Cold Slate -->
      <stop offset="70%" stop-color="#334155" /> <!-- Deep Noir -->
      <stop offset="100%" stop-color="#0F172A" /> <!-- Midnight -->
    </linearGradient>
    
    <!-- Shadow Edge Highlight -->
    <linearGradient id="noirEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
  </defs>

  <!-- Faceted Gem Shape (Octagon) -->
  <path 
    d="M8 2H16L22 8V16L16 22H8L2 16V8L8 2Z" 
    fill="url(#mysteryGradient5)" 
    stroke="url(#noirEdge)" 
    stroke-width="0.5"
  />

  <!-- Internal Facet Lines (Noir Geometry) -->
  <path d="M8 2L12 12M16 2L12 12M22 8L12 12M22 16L12 12M16 22L12 12M8 22L12 12M2 16L12 12M2 8L12 12" stroke="white" stroke-width="0.2" opacity="0.3"/>

  <!-- The Aperture Glyph (Boldest Focus) -->
  <g transform="translate(2, 2) scale(0.83)">
    <path 
      d="M12 4C7.58172 4 4 7.58172 4 12C4 16.4183 7.58172 20 12 20C16.4183 20 20 16.4183 20 12C20 7.58172 16.4183 4 12 4ZM12 7V17" 
      stroke="#FFFFFF" 
      stroke-width="2" 
      stroke-linecap="round"
    />
  </g>

  <!-- Animated Searchlight Pulse -->
  <circle cx="12" cy="12" r="2" stroke="white" stroke-width="0.5" opacity="0.8">
    <animate attributeName="r" values="2;8;2" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>