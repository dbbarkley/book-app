<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Multi-stop Sunstone Gradient -->
    <linearGradient id="yaGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7" /> <!-- Lightest Gold -->
      <stop offset="30%" stop-color="#FBBF24" /> <!-- Base Gold -->
      <stop offset="70%" stop-color="#D97706" /> <!-- Deep Amber -->
      <stop offset="100%" stop-color="#92400E" /> <!-- Dark Bronze -->
    </linearGradient>
    
    <!-- Radiant Edge Highlight -->
    <linearGradient id="yaEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
  </defs>

  <!-- Faceted Gem Shape (Octagon) -->
  <path 
    d="M8 2H16L22 8V16L16 22H8L2 16V8L8 2Z" 
    fill="url(#yaGradient5)" 
    stroke="url(#yaEdge)" 
    stroke-width="0.5"
  />

  <!-- Internal Facet Lines (Geometric Spark) -->
  <path d="M8 2L12 12M16 2L12 12M22 8L12 12M22 16L12 12M16 22L12 12M8 22L12 12M2 16L12 12M2 8L12 12" stroke="white" stroke-width="0.2" opacity="0.3"/>

  <!-- The Flare Glyph (Boldest Form) -->
  <g transform="translate(2, 2) scale(0.83)">
    <path 
      d="M13 3L10 12H17L11 21" 
      stroke="#FFFFFF" 
      stroke-width="2.5" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
  </g>

  <!-- Animated Energy Sparkles (Vibrant bursts) -->
  <circle cx="5" cy="5" r="0.6" fill="#FDE68A" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite" />
    <animate attributeName="r" values="0.6;1.2;0.6" dur="1.2s" repeatCount="indefinite" />
  </circle>
  <circle cx="19" cy="19" r="0.6" fill="#FDE68A" opacity="0.8">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.2s" repeatCount="indefinite" />
    <animate attributeName="r" values="1.2;0.6;1.2" dur="1.2s" repeatCount="indefinite" />
  </circle>
</svg>

