<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Multi-stop Bronze/Marble Gradient -->
    <linearGradient id="classicsGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97706" /> <!-- Light Bronze -->
      <stop offset="30%" stop-color="#78350F" /> <!-- Base Bronze -->
      <stop offset="70%" stop-color="#451A03" /> <!-- Deep Bronze -->
      <stop offset="100%" stop-color="#1C0902" /> <!-- Darkest Obsidian -->
    </linearGradient>
    
    <!-- Bronze Edge Highlight -->
    <linearGradient id="classicsEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#451A03" />
    </linearGradient>
  </defs>

  <!-- Faceted Gem Shape (Octagon) -->
  <path 
    d="M8 2H16L22 8V16L16 22H8L2 16V8L8 2Z" 
    fill="url(#classicsGradient5)" 
    stroke="url(#classicsEdge)" 
    stroke-width="0.5"
  />

  <!-- Internal Facet Lines (Library Dome Geometry) -->
  <path d="M8 2L12 12M16 2L12 12M22 8L12 12M22 16L12 12M16 22L12 12M8 22L12 12M2 16L12 12M2 8L12 12" stroke="white" stroke-width="0.2" opacity="0.3"/>

  <!-- The Arc Glyph (Boldest Form) -->
  <g transform="translate(2, 2) scale(0.83)">
    <path 
      d="M5 16C5 12.134 8.13401 9 12 9C15.866 9 19 12.134 19 16" 
      stroke="#FFFFFF" 
      stroke-width="2.5" 
      stroke-linecap="round"
    />
    <path 
      d="M4 18H20" 
      stroke="#FFFFFF" 
      stroke-width="2" 
      stroke-linecap="round"
    />
  </g>

  <!-- Animated "Immortal" Glow (Slow, steady pulse) -->
  <circle cx="12" cy="12" r="11" stroke="white" stroke-width="0.2" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.05;0.3" dur="5s" repeatCount="indefinite" />
    <animate attributeName="r" values="10.5;11.5;10.5" dur="5s" repeatCount="indefinite" />
  </circle>

  <!-- Subtle Gold Leaf Sparkles -->
  <circle cx="5" cy="5" r="0.4" fill="#FDE68A" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="19" cy="19" r="0.4" fill="#FDE68A" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite" />
  </circle>
</svg>

