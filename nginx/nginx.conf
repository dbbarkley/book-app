events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Use Docker's embedded DNS so upstream hostnames are re-resolved dynamically
    # after container restarts, instead of being cached at nginx startup.
    # 127.0.0.11 is Docker's internal resolver; valid=30s caps the re-resolve interval.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── HTTP: redirect to HTTPS + serve ACME challenges for Certbot ──────────
    server {
        listen 80;
        server_name getwellread.com www.getwellread.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://getwellread.com$request_uri;
        }
    }

    # ── HTTPS www → canonical redirect ────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name www.getwellread.com;

        ssl_certificate     /etc/letsencrypt/live/getwellread.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/getwellread.com/privkey.pem;

        return 301 https://getwellread.com$request_uri;
    }

    # ── HTTPS canonical ───────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name getwellread.com;

        ssl_certificate     /etc/letsencrypt/live/getwellread.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/getwellread.com/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Variables force nginx to use the resolver above on each request rather
        # than caching the IP at startup. Without this, container restarts cause 502s.
        set $backend  http://backend:3000;
        set $frontend http://frontend:3000;

        # ── Rails API ─────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         $backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── ActiveStorage (avatar uploads, file blobs) ────────────────────────
        location /rails/active_storage/ {
            proxy_pass         $backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Next.js frontend ──────────────────────────────────────────────────
        location / {
            proxy_pass         $frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }
    }
}
