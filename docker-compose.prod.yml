x-backend-env: &backend-env
  RAILS_ENV: production
  BACKEND_URL: ${BACKEND_URL}
  DATABASE_HOST: db
  DATABASE_USERNAME: ${DB_USERNAME}
  DATABASE_PASSWORD: ${DB_PASSWORD}
  DATABASE_NAME: ${DB_NAME:-book_app_production}
  REDIS_URL: redis://redis:6379/0
  SECRET_KEY_BASE: ${SECRET_KEY_BASE}
  RAILS_LOG_TO_STDOUT: "true"
  FRONTEND_URL: ${FRONTEND_URL}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
  ISBNDB_API_KEY: ${ISBNDB_API_KEY}
  HARDCOVER_API_KEY: ${HARDCOVER_API_KEY}
  GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY}
  FACEBOOK_APP_ID: ${FACEBOOK_APP_ID}
  FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
  NEW_YORK_TIMES_API_KEY: ${NEW_YORK_TIMES_API_KEY}
  SERPER_API_KEY: ${SERPER_API_KEY}
  BIG_BOOK_API_KEY: ${BIG_BOOK_API_KEY}
  PENGUI_RANDOMHOUSE_API_KEY: ${PENGUI_RANDOMHOUSE_API_KEY}
  SMTP_HOST: ${SMTP_HOST:-smtp.sendgrid.net}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USERNAME: ${SMTP_USERNAME}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-book_app_production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      <<: *backend-env
    volumes:
      - imports_tmp:/app/tmp/imports
      - active_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    command: bundle exec rails db:migrate
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    volumes:
      - imports_tmp:/app/tmp/imports
      - active_storage:/app/storage
    environment:
      <<: *backend-env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: bundle exec rails server -b 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/api/v1/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  sidekiq:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    volumes:
      - imports_tmp:/app/tmp/imports
    environment:
      <<: *backend-env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: bundle exec sidekiq

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - ./nginx/webroot:/var/www/certbot
    restart: unless-stopped
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  imports_tmp:
  active_storage:
