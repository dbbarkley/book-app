name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd /opt/wellread

            echo "Pulling latest code..."
            git pull origin main

            echo "Building and starting services..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

            echo "Waiting for backend to become healthy..."
            until [ "$(docker inspect --format='{{.State.Health.Status}}' $(docker compose -f docker-compose.prod.yml ps -q backend) 2>/dev/null)" = "healthy" ]; do
              sleep 3
            done

            echo "Reloading nginx..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod exec -T nginx nginx -s reload

            echo "Removing old images..."
            docker image prune -f

            echo "Deploy complete."
