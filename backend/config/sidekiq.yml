:queues:
  - default
  - low_priority

:scheduler:
  :schedule:
    refresh_upcoming_releases:
      cron: "0 4 * * *"  # Daily at 4:00 AM
      class: RefreshUpcomingReleasesJob
      queue: default
      description: "Fetches upcoming book releases from ISBNdb and caches in DB"
    cleanup_old_feed_items:
      cron: "0 3 * * 0"  # Weekly on Sunday at 3:00 AM
      class: CleanupOldFeedItemsJob
      queue: low_priority
      description: "Deletes feed items older than 90 days to keep the table lean"
    send_release_reminders:
      cron: "0 8 * * *"  # Daily at 8:00 AM UTC
      class: SendReleaseRemindersJob
      queue: default
      description: "Sends day-before release reminders to users who set the bell"
      timezone: "UTC"
    generate_peer_recommendations:
      cron: "0 2 * * *"  # Daily at 2:00 AM
      class: GeneratePeerRecommendationsJob
      queue: low_priority
      description: "Daily peer-based book recommendations via user similarity scoring"
